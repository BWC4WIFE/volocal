# .github/workflows/build.yml
# Builds an unsigned IPA artifact on every push/PR to main.
# No code signing, no provisioning profile — signing happens on-device
# with a development certificate via sideloading tools (AltStore, SideStore).
# Errors are rendered through xcbeautify for GitHub Actions annotation support.
name: Build Volocal IPA

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: Volocal
  CONFIGURATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.configuration || 'release' }}
  SDK: iphoneos
  DERIVED_DATA: ${{ github.workspace }}/DerivedData
  ARCHIVE_PATH: /tmp/Volocal.xcarchive
  IPA_EXPORT_PATH: /tmp/Volocal.ipa

jobs:
  build:
    name: Build and export IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # ── Caching ──────────────────────────────────────────────────────

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA }}
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/Package.resolved', '**/*.swift', '**/*.xcodeproj/**', '**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      # ── Toolchain ───────────────────────────────────────────────────

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode || echo "No Xcode apps found"
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Print environment
        run: |
          echo "Xcode: $(xcodebuild -version 2>&1 | head -1)"
          echo "Swift: $(swift --version 2>&1 | head -1)"
          echo "macOS: $(sw_vers -productVersion)"
          echo "Configuration: ${{ env.CONFIGURATION }}"
          echo "SDK: ${{ env.SDK }}"

      # ── Build & Archive ─────────────────────────────────────────────

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Volocal.xcodeproj \
            -clonedSourcePackagesDirPath /tmp/Volocal-packages \
            -skipPackageUpdates 2>&1 | xcbeautify --renderer github-actions

      - name: Clear DerivedData before archive
        run: |
          echo "Clearing stale DerivedData to prevent bundle resolution issues..."
          rm -rf "$DERIVED_DATA"
          echo "DerivedData cleared successfully"

      - name: Validate project structure
        run: |
          echo "Validating project files..."
          [ -f "Volocal.xcodeproj/project.pbxproj" ] || { echo "::error::Missing Volocal.xcodeproj/project.pbxproj"; exit 1; }
          [ -f "project.yml" ] || { echo "::warning::No project.yml found"; }
          [ -d "Volocal" ] || { echo "::error::Missing Volocal source directory"; exit 1; }
          echo "Project structure validated"

      - name: Build and archive (unsigned)
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project Volocal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk "$SDK" \
            -configuration "$CONFIGURATION" \
            -derivedDataPath "$DERIVED_DATA" \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | xcbeautify --renderer github-actions

      - name: Verify archive
        run: |
          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "::error::Archive not found at $ARCHIVE_PATH"
            exit 1
          fi
          echo "Archive size: $(du -sh "$ARCHIVE_PATH" | cut -f1)"
          echo "Products: $(ls "$ARCHIVE_PATH/Products/" 2>/dev/null || echo 'None found')"
          
          # Verify app bundle exists
          APP_BUNDLE="$ARCHIVE_PATH/Products/Applications/Volocal.app"
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "::error::App bundle not found at $APP_BUNDLE"
            ls -la "$ARCHIVE_PATH/Products/" 2>/dev/null || echo "Products directory listing failed"
            exit 1
          fi
          echo "App bundle verified at $APP_BUNDLE"

      # ── Export IPA (unsigned) ───────────────────────────────────────

      - name: Export unsigned IPA
        run: |
          set -o pipefail

          # Create minimal exportOptions.plist for unsigned export
          cat > /tmp/exportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>-</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.fikrikarim.volocal</key>
                  <string></string>
              </dict>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <false/>
              <key>teamID</key>
              <string></string>
              <key>generateAssetPackManifestBundles</key>
              <false/>
          </dict>
          </plist>
          PLISTEOF

          mkdir -p /tmp/ipa-output
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath /tmp/ipa-output \
            -exportOptionsPlist /tmp/exportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcbeautify --renderer github-actions

      - name: Rename IPA
        run: |
          IPA_FILE=$(find /tmp/ipa-output -name "*.ipa" | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "::error::No IPA found in /tmp/ipa-output"
            ls -la /tmp/ipa-output/
            exit 1
          fi
          cp "$IPA_FILE" "$IPA_EXPORT_PATH"
          echo "IPA: $IPA_EXPORT_PATH"
          echo "Size: $(du -sh "$IPA_EXPORT_PATH" | cut -f1)"
          
          # Verify IPA integrity
          if ! unzip -t "$IPA_EXPORT_PATH" > /dev/null 2>&1; then
            echo "::error::IPA file is corrupted or invalid"
            exit 1
          fi
          echo "IPA file integrity verified"

      # ── Unit Tests (Simulator) ──────────────────────────────────────

      - name: Run unit tests
        continue-on-error: true
        run: |
          set -o pipefail
          SIMULATOR=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          devices = data.get('devices', {})
          for runtime in sorted(devices.keys(), reverse=True):
              for dev in devices[runtime]:
                  if 'iPhone' in dev['name'] and dev['isAvailable']:
                      print(dev['name'])
                      sys.exit(0)
          print('iPhone 16')
          ")
          echo "Using simulator: $SIMULATOR"
          xcodebuild test \
            -scheme "$SCHEME" \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA" \
            -destination "platform=iOS Simulator,name=$SIMULATOR" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcbeautify --renderer github-actions || true

      # ── Upload Artifact ─────────────────────────────────────────────

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Volocal-${{ env.CONFIGURATION }}-${{ github.sha }}
          path: ${{ env.IPA_EXPORT_PATH }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload dSYM symbols
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Volocal-dSYM-${{ env.CONFIGURATION }}-${{ github.sha }}
          path: |
            ${{ env.ARCHIVE_PATH }}/dSYMs/**/*.dSYM
            ${{ env.ARCHIVE_PATH }}/BCSymbolMaps/**/*
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6

      # ── Build Summary ───────────────────────────────────────────────

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Volocal Build Results"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Scheme | $SCHEME |"
            echo "| Configuration | $CONFIGURATION |"
            echo "| Code Signed | No (unsigned — signed on device) |"
            echo "| Runner | ${{ runner.os }} (${{ runner.arch }}) |"
            if [ -f "$IPA_EXPORT_PATH" ]; then
              IPA_SIZE=$(du -sh "$IPA_EXPORT_PATH" | cut -f1)
              echo "| IPA Size | $IPA_SIZE |"
              echo "| IPA | ✅ Uploaded |"
            else
              echo "| IPA | ❌ Not created |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
