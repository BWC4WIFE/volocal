# project.yml — updated for volocal Thai ASR refactor
# Changes:
#   + WhisperKit SPM dependency (Thai / multilingual ASR via CoreML Whisper)
#   All other entries unchanged from original.

name: Volocal

options:
  bundleIdPrefix: com.volocal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.14.5"          # CoreML ASR (Parakeet EOU), TTS (PocketTTS), VAD (Silero)

  llama.swift:
    url: https://github.com/mattt/llama.swift
    from: "1.7130.0"        # Swift wrapper for llama.cpp — keeps GGUF LLM on Metal GPU

  WhisperKit:                # NEW — Thai + 99-language ASR via CoreML Whisper
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

targets:
  Volocal:
    type: application
    platform: iOS
    sources:
      - Volocal
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: llama.swift
        product: Llama
      - package: WhisperKit       # NEW
        product: WhisperKit
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only (Neural Engine required)
        ENABLE_BITCODE: NO
        OTHER_SWIFT_FLAGS: "-strict-concurrency=complete"
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"   # keep for llama.cpp C interop stability

# NOTE: Physical device only.  The Apple Neural Engine is unavailable in
# the Simulator — FluidAudio models will fail to compile.  Always run on
# a real iPhone 15 or later.
